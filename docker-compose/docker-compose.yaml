services:

  web:
    image: traefik:v3.7.5
    container_name: web
    hostname: web
    security_opt:
      - no-new-privileges:true
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Internal-only entrypoint for Prometheus metrics - not in `ports:`,
      # so it's only reachable from other containers on the docker network.
      - --entrypoints.metrics.address=:8082
      - --certificatesresolvers.duckdns.acme.dnschallenge=true
      - --certificatesresolvers.duckdns.acme.dnschallenge.provider=duckdns
      - --certificatesresolvers.duckdns.acme.email=${ZERO_SSL_EMAIL}
      - --certificatesresolvers.duckdns.acme.storage=/etc/traefik/acme.json
      # Dashboard is convenient while migrating - lock it down (or remove) once everything is moved over.
      - --api.dashboard=true
      - --log.level=INFO
      # Common format (not json) and a real file on disk - fail2ban's
      # built-in Traefik filters are written against this log layout and
      # need to tail an actual file, not Docker's wrapped container logs.
      # Lives in its own volume (not /etc/traefik) so fail2ban only ever
      # needs read access to logs, never to acme.json's private keys.
      - --accesslog=true
      - --accesslog.filepath=/var/log/traefik/access.log
      - --metrics.prometheus=true
      - --metrics.prometheus.entrypoint=metrics
      - --metrics.prometheus.addEntryPointsLabels=true
      - --metrics.prometheus.addRoutersLabels=true
      - --metrics.prometheus.addServicesLabels=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.home`)"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"
    environment:
      - TZ=Europe/Amsterdam
      - DUCKDNS_TOKEN=${DUCKDNS_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/tim/config/traefik:/etc/traefik
      - /home/tim/config/traefik-logs:/var/log/traefik
    ports:
      - 443:443
      - 80:80
    networks:
      - proxy-net
      - media-net
      - monitoring-net
    # Lets Traefik reach containers that use network_mode: host
    # (homeassistant, esphome, plex), which it can't auto-discover.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    hostname: fail2ban
    # Bans have to apply to the host's real network stack, not a container
    # bridge - needs host networking and the caps to drive iptables directly.
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=Europe/Amsterdam
      # A real file (inside the already-persisted /data) instead of stdout,
      # so Telegraf can tail it and feed ban/unban events into Grafana.
      - F2B_LOG_TARGET=/data/fail2ban.log
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=30d
    volumes:
      - /home/tim/config/fail2ban:/data
      - ./services/fail2ban/jail.d/sshd.local:/data/jail.d/sshd.local:ro
      - ./services/fail2ban/jail.d/traefik-auth.local:/data/jail.d/traefik-auth.local:ro
      - ./services/fail2ban/jail.d/traefik-botsearch.local:/data/jail.d/traefik-botsearch.local:ro
      # Custom filter - not bundled in this image, see the file for why.
      - ./services/fail2ban/filter.d/traefik-botsearch.local:/data/filter.d/traefik-botsearch.local:ro
      - /home/tim/config/traefik-logs:/var/log/traefik:ro
      # Single file, not the whole /var/log dir - mounting both this and
      # the traefik-logs subpath above under one read-only /var/log mount
      # fails ("mkdir ... read-only file system") because Docker can't
      # create the /var/log/traefik mountpoint inside an already-read-only
      # parent mount. rsyslog must have already created this file on the
      # host before the container starts, or this becomes the same
      # file-vs-directory footgun as the original access.log issue.
      - /var/log/auth.log:/var/log/auth.log:ro
      # Expose the socket directory to the host so fail2ban-ui can reach it.
      # The socket is created inside the container; without this mount it
      # never appears on the host and fail2ban-ui's bind mount points at nothing.
      - /home/tim/config/fail2ban-run:/var/run/fail2ban
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  fail2ban-ui:
    image: swissmakers/fail2ban-ui:latest
    container_name: fail2ban-ui
    hostname: fail2ban-ui
    depends_on:
      - fail2ban
      - web
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      # Read the fail2ban database to display ban history
      - /home/tim/config/fail2ban:/data:ro
      # Same host directory as fail2ban's /var/run/fail2ban mount — Docker
      # can't bind-mount a socket file that doesn't exist yet, so mount the
      # whole directory and let fail2ban create the socket inside it.
      - /home/tim/config/fail2ban-run:/var/run/fail2ban
    expose:
      - 8080
    networks:
      - proxy-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.fail2ban-ui.rule=Host(`fail2ban.home`)
      - traefik.http.routers.fail2ban-ui.entrypoints=web
      - traefik.http.services.fail2ban-ui.loadbalancer.server.port=8080
    restart: unless-stopped

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15.3.0
    container_name: wg-easy
    networks:
      wg:
        ipv4_address: 10.42.42.42
        ipv6_address: fdcc:ad94:bacf:61a3::2a
      proxy-net: {}
    volumes:
      - /home/tim/config/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    labels:
      # Equivalent of the wg-easy.subdomain.conf: HTTPS + Authelia forward-auth.
      # `traefik.docker.network` disambiguates which of wg-easy's two networks
      # Traefik should route through, since it's attached to more than one.
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - traefik.http.routers.wg-easy.rule=Host(`wg-easy.timsdomain.duckdns.org`)
      - traefik.http.routers.wg-easy.entrypoints=websecure
      - traefik.http.routers.wg-easy.tls=true
      - traefik.http.routers.wg-easy.tls.certresolver=duckdns
      - traefik.http.routers.wg-easy.middlewares=authelia@docker
      - traefik.http.services.wg-easy.loadbalancer.server.port=51821
    environment:
      - SERVICE_FQDN_WIREGUARDEASY_8000
      - WG_HOST=${WG_HOST}
#      - WG_DEVICE=${WG_DEVICE}
      - WG_ALLOWED_IPS=${WG_ALLOWED_IPS}
      - WG_DEFAULT_DNS=${WG_DEFAULT_DNS}
      - WG_PERSISTENT_KEEPALIVE=25
      - UI_TRAFFIC_STATS=true
    ports:
      - "51820:51820/udp"
      - "127.0.0.1:51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1

  authelia:
    image: ghcr.io/authelia/authelia:4.39.20
    container_name: authelia
    hostname: authelia
    user: "1000:1000"
    depends_on:
      - web
    environment:
      - TZ=Europe/Amsterdam
    expose:
      - 9091
    volumes:
      - /home/tim/config/authelia:/config
    networks:
      - proxy-net
    security_opt:
      - no-new-privileges:true
    labels:
      # Defines the reusable forward-auth middleware. Reference it from any
      # router with `middlewares=authelia@docker` (equivalent to including
      # authelia-authrequest.conf in a SWAG subdomain.conf).
      - traefik.enable=true
      - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/verify?rd=https://auth.timsdomain.duckdns.org
      - traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Name,Remote-Email
      # Authelia's /api/verify response is tiny (just headers); cap it well
      # above what it'd ever send to silence Traefik's DoS-risk warning.
      - traefik.http.middlewares.authelia.forwardauth.maxResponseBodySize=1048576
      # The Authelia login portal itself, the `rd=` redirect target above.
      # Only the public domain here - mixing in a non-public `.home` host on
      # the same ACME-backed router makes Let's Encrypt reject the whole
      # request (it won't issue for any identifier without a public TLD).
      - traefik.http.routers.authelia.rule=Host(`auth.timsdomain.duckdns.org`)
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.tls=true
      - traefik.http.routers.authelia.tls.certresolver=duckdns
      - traefik.http.services.authelia.loadbalancer.server.port=9091
    restart: unless-stopped

  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.41.1
    container_name: gluetun
    hostname: gluetun
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - SERVER_COUNTRIES=Netherlands
      - SERVER_CITIES=Amsterdam
      # Wireguard:
      - WIREGUARD_PRIVATE_KEY=${NORDVPN_TOKEN}
      - TZ=Europe/Amsterdam
      # Server list updater
      # See https://github.com/qdm12/gluetun-wiki/blob/main/setup/servers.md#update-the-vpn-servers-list
      - UPDATER_PERIOD=24h
    volumes:
      - /home/tim/config/gluetun:/gluetun
    ports:
      - 8888:8888/tcp # HTTP proxy
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
      - 9091:9091 # Transmission
      - 51413:51413 # Transmission
      - 51413:51413/udp # Transmission
      - 8090:8090
      - 8480:8080 # SabNZB
    networks:
      - media-net
    labels:
      # transmission & sabnzbd use network_mode: service:gluetun, so they have
      # no network identity of their own for Traefik's Docker provider to
      # discover - point the loadbalancer straight at gluetun's internal
      # ports instead (the same ports gluetun republishes above).
      - traefik.enable=true
      - traefik.http.routers.transmission.rule=Host(`transmission.home`)
      - traefik.http.routers.transmission.entrypoints=web
      # Two services are defined on this one container, so Traefik can't
      # auto-link a router to "the" service - point each router at its
      # service explicitly.
      - traefik.http.routers.transmission.service=transmission
      - traefik.http.services.transmission.loadbalancer.server.url=http://gluetun:9091
      - traefik.http.routers.sabnzbd.rule=Host(`sabnzbd.home`)
      - traefik.http.routers.sabnzbd.entrypoints=web
      - traefik.http.routers.sabnzbd.service=sabnzbd
      # Internal container port (the left side of "8480:8080" is only the
      # host-published port; other containers reach it via the right side).
      - traefik.http.services.sabnzbd.loadbalancer.server.url=http://gluetun:8080
    restart: unless-stopped

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:2026.6.4
    container_name: homeassistant
    hostname: homeassistant
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - web
      - transmission
      - influxdb
      - grafana
      - telegraf
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8123"]
      interval: 5s
      timeout: 3s
      retries: 15
    privileged: true
    devices:
      # - /dev/ttyAMA0
      - /dev/ttyACM0
    environment:
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/homeassistant:/config
      - /run/dbus:/run/dbus:ro
    network_mode: host
    labels:
      # network_mode: host means Traefik can't auto-discover a container IP -
      # route to the host directly via the host-gateway alias set on traefik.
      - traefik.enable=true
      - traefik.http.routers.homeassistant.rule=Host(`ha.home`)
      - traefik.http.routers.homeassistant.entrypoints=web
      - traefik.http.services.homeassistant.loadbalancer.server.url=http://host.docker.internal:8123
    restart: unless-stopped

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:2026.6.2
    volumes:
      - /home/tim/config/esphome/config:/config
    environment:
      - TZ=Europe/Amsterdam
    restart: unless-stopped
    privileged: true
    network_mode: host
    labels:
      # network_mode: host - same host-gateway workaround as homeassistant.
      # Verify 6052 is still ESPHome's dashboard port for your version.
      - traefik.enable=true
      - traefik.http.routers.esphome.rule=Host(`esphome.home`)
      - traefik.http.routers.esphome.entrypoints=web
      - traefik.http.services.esphome.loadbalancer.server.url=http://host.docker.internal:6052

      #  zigbee2mqtt:
      #    image: koenkk/zigbee2mqtt
      #    container_name: zigbee2mqtt
      #    devices:
      #      - /dev/ttyACM0
      #    environment:
      #      - TZ=Europe/Amsterdam
      #    volumes:
      #      - /home/tim/config/zigbee2mqtt:/app/data
      #      - /run/udev:/run/udev:ro
      #    ports:
      #      - 8580:8080
      #    networks:
      #      - media-net
      #    restart: unless-stopped
      #
      #  mosquitto:
      #    image: eclipse-mosquitto:2.0
      #    container_name: mosquitto
      #    command: "mosquitto -c /mosquitto-no-auth.conf"
      #    volumes:
      #      - /home/tim/config/mosquitto:/mosquitto
      #    ports:
      #      - 1883:1883
      #      - 9001:9001
      #    networks:
      #      - media-net
      #    restart: unless-stopped

  influxdb:
    image: influxdb:2.9.1
    container_name: influxdb
    hostname: influxdb
    depends_on:
      - web
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_USER_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=home-assistant
    volumes:
      - /home/tim/config/influxdb2:/var/lib/influxdb2
    ports:
      - "127.0.0.1:8086:8086"
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.influxdb.rule=Host(`influxdb.home`)
      - traefik.http.routers.influxdb.entrypoints=web
      - traefik.http.services.influxdb.loadbalancer.server.port=8086
    restart: unless-stopped

  telegraf:
    image: telegraf:1.39.0
    container_name: telegraf
    hostname: telegraf
    user: telegraf:996 #Ensure docker group ID is correct
    privileged: true
    depends_on:
      - web
      - influxdb
    environment:
      - HOST_PROC=/hostfs/proc
      - HOST_MOUNT_PREFIX=/hostfs
      - TELEGRAF_INFLUXDB_TOKEN=${TELEGRAF_INFLUXDB_TOKEN}
      - TELEGRAF_INFLUXDB_ORG=${TELEGRAF_INFLUXDB_ORG}
      - TELEGRAF_INFLUXDB_BUCKET=${TELEGRAF_INFLUXDB_BUCKET}
    volumes:
      - /:/hostfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro

    networks:
      - monitoring-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.1.0
    container_name: grafana
    hostname: grafana
    user: "472:472"
    depends_on:
      - web
      - telegraf
    volumes:
      - /home/tim/config/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.home`)
      - traefik.http.routers.grafana.entrypoints=web
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    restart: unless-stopped

  transmission:
    image: linuxserver/transmission:4.1.2
    container_name: transmission
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - USER=${TRANSMISSION_USERNAME}
      - PASS=${TRANSMISSION_PASSWORD}
    volumes:
      - /home/tim/config/transmission:/config
      - /home/tim/nas/data/torrents:/data/torrents
    network_mode: "service:gluetun"
    restart: unless-stopped

  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.4
    container_name: sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/sabnzbd:/config
      - /home/tim/nas/data/usenet:/data/usenet
    network_mode: "service:gluetun"
    restart: unless-stopped

  sonarr-4k:
    image: linuxserver/sonarr:4.0.19
    container_name: sonarr-4k
    hostname: sonarr-4k
    depends_on:
      - web
      - prowlarr
      - sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/sonarr-4k:/config
      - /home/tim/nas/data:/data
    expose:
      - 8989
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr-4k.rule=Host(`sonarr4k.home`)
      - traefik.http.routers.sonarr-4k.entrypoints=web
      - traefik.http.services.sonarr-4k.loadbalancer.server.port=8989
    restart: unless-stopped

  sonarr:
    image: linuxserver/sonarr:4.0.19
    container_name: sonarr
    hostname: sonarr
    depends_on:
      - web
      - prowlarr
      - transmission
      - sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/sonarr:/config
      - /home/tim/nas/data:/data
    expose:
      - 8989
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.sonarr.rule=Host(`sonarr.home`)
      - traefik.http.routers.sonarr.entrypoints=web
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
    restart: unless-stopped

  radarr-4k:
    image: linuxserver/radarr:6.2.1
    container_name: radarr-4k
    hostname: radarr-4k
    depends_on:
      - web
      - prowlarr
      - sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/radarr-4k:/config
      - /home/tim/nas/data:/data
    expose:
      - 7878
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr-4k.rule=Host(`radarr4k.home`)
      - traefik.http.routers.radarr-4k.entrypoints=web
      - traefik.http.services.radarr-4k.loadbalancer.server.port=7878
    restart: unless-stopped

  radarr:
    image: linuxserver/radarr:6.2.1
    container_name: radarr
    hostname: radarr
    depends_on:
      - web
      - prowlarr
      - transmission
      - sabnzbd
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/radarr:/config
      - /home/tim/nas/data:/data
    expose:
      - 7878
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.radarr.rule=Host(`radarr.home`)
      - traefik.http.routers.radarr.entrypoints=web
      - traefik.http.services.radarr.loadbalancer.server.port=7878
    restart: unless-stopped

  chaptarr:
    image: robertlordhood/chaptarr:latest
    container_name: chaptarr
    hostname: chaptarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/chaptarr:/config
      - /home/tim/nas/data:/data
    expose:
      - 8789
    networks:
        - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.chaptarr.rule=Host(`chaptarr.home`)
      - traefik.http.routers.chaptarr.entrypoints=web
      - traefik.http.services.chaptarr.loadbalancer.server.port=8789
    restart: "unless-stopped"

  lidarr:
    image: lscr.io/linuxserver/lidarr:3.1.3-nightly
    container_name: lidarr
    hostname: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/lidarr:/config
      - /home/tim/nas/data:/data
    expose:
      - 8686
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.lidarr.rule=Host(`lidarr.home`)
      - traefik.http.routers.lidarr.entrypoints=web
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.5.0-nightly
    container_name: prowlarr
    hostname: prowlarr
    depends_on:
      - web
      - flaresolverr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/prowlarr:/config
    expose:
      - 9696
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.prowlarr.rule=Host(`prowlarr.home`)
      - traefik.http.routers.prowlarr.entrypoints=web
      - traefik.http.services.prowlarr.loadbalancer.server.port=9696
    restart: unless-stopped

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:2.35.1
    container_name: audiobookshelf
    hostname: audiobookshelf
    environment:
      - TZ=Europe/Amsterdam
      - PORT=13378
    expose:
      - 13378
    volumes:
      - /home/tim/nas/data/media/audio/audiobooks:/audiobooks
      - /home/tim/nas/data/media/audio/podcasts:/podcasts
      - /home/tim/config/audiobookshelf:/config
      - /home/tim/nas/data/media/audiobookshelf/metadata:/metadata
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.audiobookshelf.rule=Host(`audiobookshelf.home`)
      - traefik.http.routers.audiobookshelf.entrypoints=web
      - traefik.http.services.audiobookshelf.loadbalancer.server.port=13378
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    hostname: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - TZ=Europe/Amsterdam
    expose:
      - 8191
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

