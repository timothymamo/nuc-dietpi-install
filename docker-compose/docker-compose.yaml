  plex:
    image: linuxserver/plex:1.43.2
    container_name: plex
    hostname: plex
    depends_on:
      - web
      - sonarr
      - radarr
    environment:
      - PUID=1000
      - PGID=1000
      - VERSION=docker
    volumes:
      - /home/tim/config/plex:/config
      - /home/tim/nas/data/media:/data/media
      - /tmp/transcoding:/tmp/transcoding
    network_mode: host
    labels:
      # network_mode: host - same host-gateway workaround as homeassistant.
      # Plex is commonly left direct (remote access/relay expects to see the
      # real LAN), so this is here for completeness - drop it if unwanted.
      - traefik.enable=true
      - traefik.http.routers.plex.rule=Host(`plex.home`)
      - traefik.http.routers.plex.entrypoints=web
      - traefik.http.services.plex.loadbalancer.server.url=http://host.docker.internal:32400
    restart: unless-stopped
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    hostname: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/bazarr/config:/config
      - /home/tim/nas/data//media/movies:/movies #optional
      - /home/tim/nas/data/media/tv:/tv #optional
    expose:
      - 6767
    security_opt:
      - no-new-privileges:true
    networks:
      - media-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.bazarr.rule=Host(`bazarr.home`)
      - traefik.http.routers.bazarr.entrypoints=web
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
    restart: unless-stopped

  tautulli:
    image: ghcr.io/tautulli/tautulli:v2.17.2
    container_name: tautulli
    hostname: tautulli
    depends_on:
      - plex
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - /home/tim/config/tautulli:/config
    expose:
      - 8181
    networks:
      - media-net
      - monitoring-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=media-net
      - traefik.http.routers.tautulli.rule=Host(`tautulli.home`)
      - traefik.http.routers.tautulli.entrypoints=web
      - traefik.http.services.tautulli.loadbalancer.server.port=8181
    restart: unless-stopped

  notifiarr:
    image: golift/notifiarr:v0.9.5
    container_name: notifiarr
    hostname: notifiarr
    environment:
      - DN_API_KEY=${DN_API_KEY}
      - DN_UI_PASSWORD=${DN_UI_PASSWORD}
    volumes:
      - /home/tim/config/notifiarr:/config
      - /var/run/utmp:/var/run/utmp
      - /etc/machine-id:/etc/machine-id
    expose:
      - 5454
    networks:
      - media-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.http.routers.notifiarr.rule=Host(`notifiarr.home`)
      - traefik.http.routers.notifiarr.entrypoints=web
      - traefik.http.services.notifiarr.loadbalancer.server.port=5454
    restart: unless-stopped

  speedtest-tracker:
    image: linuxserver/speedtest-tracker:1.14.5
    container_name: speedtest-tracker
    hostname: speedtest-tracker
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
      - MAIL_HOST=${SPEEDTEST_MAIL_HOST}
      - MAIL_PORT=${SPEEDTEST_MAIL_PORT}
      - MAIL_USERNAME=${SPEEDTEST_MAIL_USERNAME}
      - MAIL_PASSWORD=${SPEEDTEST_MAIL_PASSWORD}
      - MAIL_ENCRYPTION=${SPEEDTEST_MAIL_ENCRYPTION}
      - MAIL_FROM_ADDRESS=${SPEEDTEST_MAIL_FROM_ADDRESS}
      - APP_KEY=${SPEEDTEST_APP_KEY}
      - DB_CONNECTION=sqlite
      - SPEEDTEST_SCHEDULE="0 */6 * * *"
      - SPEEDTEST_SERVERS="49730,61186"
      - PRUNE_RESULTS_OLDER_THAN=120
    volumes:
      - /home/tim/config/speedtest:/config
    expose:
      - 80
    networks:
      - monitoring-net
      - proxy-net
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy-net
      - traefik.http.routers.speedtest-tracker.rule=Host(`speedtest.home`)
      - traefik.http.routers.speedtest-tracker.entrypoints=web
      - traefik.http.services.speedtest-tracker.loadbalancer.server.port=80
    restart: unless-stopped

networks:
  proxy-net:
    name: proxy-net
    driver: bridge
  media-net:
    name: media-net
    driver: bridge
  monitoring-net:
    name: monitoring-net
    driver: bridge
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
        - subnet: fdcc:ad94:bacf:61a3::/64
